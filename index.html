<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0, user-scalable=yes">
    <title>庫存管理系統 · 台斤重量版</title>
    <!-- Font Awesome 6 圖標 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- XLSX 匯出套件 -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <style>
        /* ===== 全域樣式 (保持不變) ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
        }

        body {
            background-color: #f3f4f6;
            padding: 20px;
            color: #1f2937;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
        }

        .header {
            background: linear-gradient(145deg, #10b981, #059669);
            color: white;
            padding: 28px 32px;
            border-radius: 24px;
            margin-bottom: 30px;
            box-shadow: 0 10px 25px rgba(16, 185, 129, 0.2);
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .header i {
            font-size: 48px;
            background: rgba(255,255,255,0.2);
            padding: 16px;
            border-radius: 20px;
        }
        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 6px;
        }
        .header p {
            font-size: 1rem;
            opacity: 0.9;
        }

        .nav-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 16px;
            margin-bottom: 30px;
        }
        .nav-btn {
            background: white;
            border: none;
            border-radius: 20px;
            padding: 24px 16px;
            font-size: 1.3rem;
            font-weight: 600;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            color: #374151;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            transition: all 0.2s ease;
            border: 2px solid transparent;
            cursor: pointer;
        }
        .nav-btn i {
            font-size: 2rem;
        }
        .nav-btn.active {
            color: white;
            transform: translateY(-4px);
            box-shadow: 0 12px 20px rgba(0,0,0,0.1);
        }
        .nav-btn.outbound.active { background: #ef4444; }
        .nav-btn.inbound.active  { background: #3b82f6; }
        .nav-btn.settings.active { background: #6b7280; }

        .tab-content {
            display: none;
            background: white;
            border-radius: 28px;
            padding: 32px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            animation: fade 0.3s;
        }
        .tab-content.active { display: block; }
        @keyframes fade { from { opacity: 0.3; } to { opacity: 1; } }

        h2 {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.8rem;
            font-weight: 700;
            color: #111827;
            margin-bottom: 28px;
            padding-bottom: 16px;
            border-bottom: 3px solid #e5e7eb;
        }

        .form-card {
            background: #f9fafb;
            border-radius: 20px;
            padding: 28px;
            margin-bottom: 30px;
            border: 1px solid #e5e7eb;
        }
        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 6px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #374151;
            font-size: 0.95rem;
        }
        input, select, textarea {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #d1d5db;
            border-radius: 14px;
            font-size: 1rem;
            transition: 0.2s;
            background: white;
        }
        input:focus, select:focus, textarea:focus {
            border-color: #10b981;
            box-shadow: 0 0 0 4px rgba(16,185,129,0.1);
            outline: none;
        }
        input:read-only {
            background-color: #f3f4f6;
            cursor: default;
        }
        button {
            border: none;
            border-radius: 16px;
            padding: 16px 24px;
            font-size: 1.1rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: 0.2s;
            color: white;
            width: 100%;
            margin-top: 10px;
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .btn-outbound { background: #ef4444; }
        .btn-inbound  { background: #3b82f6; }
        .btn-success  { background: #10b981; }
        .btn-warning  { background: #f59e0b; }
        .btn-secondary{ background: #9ca3af; }
        .btn-danger   { background: #ef4444; }
        button:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }

        .status-message {
            padding: 16px;
            border-radius: 14px;
            margin-top: 16px;
            display: none;
            font-weight: 500;
        }
        .status-success { background: #d1fae5; color: #065f46; border: 1px solid #6ee7b7; }
        .status-error   { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
        .status-warning { background: #ffedd5; color: #9a3412; border: 1px solid #fed7aa; }

        .notes-summary {
            background: #fffbeb;
            border: 2px solid #fbbf24;
            border-radius: 20px;
            padding: 24px;
            margin-top: 30px;
        }
        .notes-stats {
            display: grid;
            grid-template-columns: repeat(3,1fr);
            gap: 16px;
            margin: 20px 0;
        }
        .stat-box {
            background: white;
            padding: 20px;
            border-radius: 16px;
            text-align: center;
            border: 2px solid #fef3c7;
        }
        .stat-number {
            font-size: 2rem;
            font-weight: 700;
            color: #b45309;
        }
        .notes-list {
            max-height: 300px;
            overflow-y: auto;
            margin-top: 16px;
        }
        .note-item {
            background: white;
            padding: 16px;
            border-radius: 14px;
            margin-bottom: 10px;
            border-left: 6px solid #f59e0b;
        }

        .record-list {
            margin-top: 25px;
            max-height: 550px;
            overflow-y: auto;
        }
        .record-item {
            background: #fafafa;
            border: 1px solid #e5e7eb;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .badge {
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 600;
            color: white;
            margin-right: 12px;
        }
        .badge-outbound { background: #ef4444; }
        .badge-inbound  { background: #3b82f6; }

        .info-box {
            background: #f9fafb;
            border-left: 8px solid #3b82f6;
            border-radius: 16px;
            padding: 24px;
            margin-top: 30px;
        }
        .info-box h3 { display: flex; gap: 10px; margin-bottom: 20px; }

        .empty-state {
            text-align: center;
            padding: 50px;
            color: #9ca3af;
        }

        @media (max-width: 640px) {
            body { padding: 12px; }
            .header { flex-direction: column; text-align: center; }
            .nav-grid { grid-template-columns: 1fr; }
            .record-item { flex-direction: column; align-items: flex-start; }
            .record-actions { margin-top: 16px; width: 100%; }
            .notes-stats { grid-template-columns: 1fr; }
        }

        .modal-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5);
            align-items: center; justify-content: center; z-index: 1000;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: white; border-radius: 28px; padding: 32px; max-width: 500px; width: 90%;
        }
        .export-option {
            padding: 12px;
            margin-bottom: 8px;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            cursor: pointer;
        }
        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <i class="fas fa-weight-hanging"></i>
            <div>
                <h1>庫存管理系統</h1>
                <p><i class="fas fa-cloud-upload-alt"></i> 台斤重量版 · 自動同步 Google Sheets</p>
            </div>
        </div>

        <div class="nav-grid">
            <button class="nav-btn outbound active" onclick="switchTab('outbound')">
                <i class="fas fa-sign-out-alt"></i> 出庫記錄
            </button>
            <button class="nav-btn inbound" onclick="switchTab('inbound')">
                <i class="fas fa-sign-in-alt"></i> 入庫記錄
            </button>
            <button class="nav-btn settings" onclick="switchTab('settings')">
                <i class="fas fa-cog"></i> 系統設定
            </button>
        </div>

        <!-- ========== 出庫記錄 ========== -->
        <div id="tab-outbound" class="tab-content active">
            <h2><i class="fas fa-sign-out-alt"></i> 出庫記錄</h2>
            <div class="form-card">
                <form id="outboundForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label>📅 日期</label>
                            <input type="date" id="outbound-date" required>
                        </div>
                        <div class="form-group">
                            <label>⏰ 時間</label>
                            <input type="time" id="outbound-time" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>👤 操作人員</label>
                            <select id="outbound-person" required></select>
                        </div>
                        <div class="form-group">
                            <label>📦 物品名稱</label>
                            <select id="outbound-item" required></select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>📏 單位</label>
                            <select id="outbound-unit" required>
                                <option value="">請選擇單位</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>🔢 數量</label>
                            <input type="number" id="outbound-quantity" step="1" min="1" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>🏚️ 倉庫</label>
                            <select id="outbound-warehouse" required></select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>⚖️ 重量 (台斤)</label>
                            <input type="number" id="outbound-weight-tael" step="0.01" min="0.01" placeholder="輸入台斤">
                        </div>
                        <div class="form-group">
                            <label>⚖️ 重量 (公斤)</label>
                            <input type="number" id="outbound-weight-kg" step="0.01" min="0.01" placeholder="輸入公斤">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>📝 備註</label>
                        <textarea id="outbound-notes" rows="2" placeholder="用途、領用人、原因等"></textarea>
                    </div>
                    <button type="submit" id="outbound-submit-btn" class="btn-outbound">
                        <i class="fas fa-paper-plane"></i> 提交出庫記錄 (同步至 Google Sheets)
                    </button>
                </form>
                <div id="outbound-status" class="status-message"></div>
            </div>

            <div id="outbound-notes-summary" class="notes-summary">
                <h3><i class="fas fa-sticky-note"></i> 今日出庫備註加總</h3>
                <div id="outbound-notes-stats" class="notes-stats"></div>
                <div id="outbound-notes-list" class="notes-list"></div>
            </div>
        </div>

        <!-- ========== 入庫記錄 ========== -->
        <div id="tab-inbound" class="tab-content">
            <h2><i class="fas fa-sign-in-alt"></i> 入庫記錄</h2>
            <div class="form-card">
                <form id="inboundForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label>📅 日期</label>
                            <input type="date" id="inbound-date" required>
                        </div>
                        <div class="form-group">
                            <label>⏰ 時間</label>
                            <input type="time" id="inbound-time" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>👤 操作人員</label>
                            <select id="inbound-person" required></select>
                        </div>
                        <div class="form-group">
                            <label>📦 物品名稱</label>
                            <select id="inbound-item" required></select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>📏 單位</label>
                            <select id="inbound-unit" required>
                                <option value="">請選擇單位</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>🔢 數量</label>
                            <input type="number" id="inbound-quantity" step="1" min="1" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>🏚️ 倉庫</label>
                            <select id="inbound-warehouse" required></select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>⚖️ 重量 (台斤)</label>
                            <input type="number" id="inbound-weight-tael" step="0.01" min="0.01" placeholder="輸入台斤">
                        </div>
                        <div class="form-group">
                            <label>⚖️ 重量 (公斤)</label>
                            <input type="number" id="inbound-weight-kg" step="0.01" min="0.01" placeholder="輸入公斤">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>📝 備註</label>
                        <textarea id="inbound-notes" rows="2" placeholder="供應商、批號、來源等"></textarea>
                    </div>
                    <button type="submit" id="inbound-submit-btn" class="btn-inbound">
                        <i class="fas fa-paper-plane"></i> 提交入庫記錄 (同步至 Google Sheets)
                    </button>
                </form>
                <div id="inbound-status" class="status-message"></div>
            </div>

            <div id="inbound-notes-summary" class="notes-summary">
                <h3><i class="fas fa-sticky-note"></i> 今日入庫備註加總</h3>
                <div id="inbound-notes-stats" class="notes-stats"></div>
                <div id="inbound-notes-list" class="notes-list"></div>
            </div>
        </div>

        <!-- ========== 系統設定 ========== -->
        <div id="tab-settings" class="tab-content">
            <h2><i class="fas fa-cog"></i> 系統設定</h2>

            <!-- Google Sheets 同步狀態 -->
            <div class="info-box" style="border-left-color: #10b981;">
                <h3><i class="fas fa-cloud-upload-alt"></i> Google Sheets 同步設定</h3>
                <p style="background: #d1fae5; padding: 16px; border-radius: 12px;">
                    <strong>✅ 目前使用方案A (text/plain 跳過預檢)</strong><br>
                    部署網址已寫死在程式碼中，如需更換請修改 <code style="background: white; padding: 4px 8px; border-radius: 6px;">GAS_URL</code> 變數。
                </p>
            </div>

            <!-- Google 試算表連結設定 -->
            <div class="info-box">
                <h3><i class="fab fa-google"></i> Google 試算表連結設定</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>📤 出庫試算表連結</label>
                        <input type="url" id="google-form-outbound" placeholder="貼上 Google 試算表連結">
                    </div>
                    <div class="form-group">
                        <label>📥 入庫試算表連結</label>
                        <input type="url" id="google-form-inbound" placeholder="貼上 Google 試算表連結">
                    </div>
                </div>
                <button id="save-google-forms" class="btn-success" style="width: auto; padding: 14px 36px;">
                    <i class="fas fa-save"></i> 儲存連結
                </button>
                <div id="google-forms-status" class="status-message"></div>
            </div>

            <!-- 人員管理 -->
            <div class="info-box" style="border-left-color: #f97316;">
                <h3><i class="fas fa-users"></i> 人員管理</h3>
                <div class="form-row">
                    <input type="text" id="new-person" placeholder="新增人員名稱">
                    <button id="add-person" class="btn-success" style="width: auto;"><i class="fas fa-user-plus"></i> 新增</button>
                </div>
                <div id="person-list" class="record-list" style="max-height: 250px;"></div>
            </div>

            <!-- 物品管理 -->
            <div class="info-box" style="border-left-color: #3b82f6;">
                <h3><i class="fas fa-boxes"></i> 物品管理</h3>
                <div class="form-row">
                    <input type="text" id="new-item-name" placeholder="物品名稱">
                    <input type="text" id="new-item-unit-default" placeholder="預設單位 (如 包、箱)">
                    <button id="add-item" class="btn-success" style="width: auto;"><i class="fas fa-plus"></i> 新增</button>
                </div>
                <div id="item-list" class="record-list" style="max-height: 250px;"></div>
            </div>

            <!-- 單位管理 -->
            <div class="info-box" style="border-left-color: #f59e0b;">
                <h3><i class="fas fa-ruler"></i> 單位管理</h3>
                <div class="form-row">
                    <input type="text" id="new-unit" placeholder="新增單位名稱 (例：包、箱、袋)">
                    <button id="add-unit" class="btn-success" style="width: auto;"><i class="fas fa-plus"></i> 新增</button>
                </div>
                <div id="unit-list" class="record-list" style="max-height: 250px;"></div>
            </div>

            <!-- 倉庫管理 -->
            <div class="info-box" style="border-left-color: #8b5cf6;">
                <h3><i class="fas fa-warehouse"></i> 倉庫管理</h3>
                <div class="form-row">
                    <input type="text" id="new-warehouse" placeholder="倉庫名稱">
                    <button id="add-warehouse" class="btn-success" style="width: auto;"><i class="fas fa-plus"></i> 新增</button>
                </div>
                <div id="warehouse-list" class="record-list" style="max-height: 250px;"></div>
            </div>

            <!-- 資料匯出匯入 -->
            <div class="info-box" style="border-left-color: #6b7280;">
                <h3><i class="fas fa-database"></i> 資料管理</h3>
                <div class="form-row">
                    <button id="export-data" class="btn-primary" style="background: #10b981;"><i class="fas fa-download"></i> 匯出 Excel</button>
                    <button id="import-data" class="btn-secondary" style="background: #6b7280;"><i class="fas fa-upload"></i> 匯入 JSON</button>
                    <input type="file" id="import-file" accept=".json" style="display: none;">
                </div>
            </div>
            <div id="settings-status" class="status-message"></div>
        </div>
    </div>

    <!-- 匯出模態框 -->
    <div id="export-modal" class="modal-overlay">
        <div class="modal">
            <h3 style="margin-bottom: 24px;"><i class="fas fa-file-excel"></i> 匯出 Excel 報表</h3>
            <div class="export-option" onclick="selectExport('all')">
                <label><input type="radio" name="export-type" value="all" checked> 📋 全部分頁</label>
            </div>
            <div class="export-option" onclick="selectExport('total')">
                <label><input type="radio" name="export-type" value="total"> 📄 總表</label>
            </div>
            <div class="modal-actions">
                <button class="btn-secondary" onclick="closeModal()" style="width: 50%;">取消</button>
                <button class="btn-success" onclick="doExport()" style="width: 50%;">下載</button>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        //  🚀 庫存管理系統 - 台斤重量版 (雙向換算 + 提交後清空暫存)
        //  ⚠️ 重要：請將下方 GAS_URL 改為您自己的 Apps Script 部署網址！
        // ============================================================
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbzltVS3Uolb8QWgJMb8BiHworzXj-qbvLtRNeTd7kQVKVUpXgO5ICa154gzWlQbsfjh/exec'; // ← 請換成您的！

        // 台斤轉公斤倍數 (1台斤 = 0.6公斤)
        const TAEL_TO_KG = 0.6;
        const KG_TO_TAEL = 1 / TAEL_TO_KG; // 1公斤 = 1.6667台斤

        // ========== 全域資料結構 ==========
        let inventoryData = {
            persons: ['蕭詠方', '王珮儒', '王俊智', '朱宥銓', '何致瑩', '蔡惠如', '魏賢豪', '魏銓輝', '洪承億', '張源展', '陳紐庭', '陳冠瑋', '何淑年', '曾瑛婷', '林佳慧', '林美慧', '陳映延'],
            items: [
                { name: '鳳梨蘋果汁', unit: '包' },
                { name: '鳳梨汁', unit: '包' },
                { name: '金鑽鳳梨', unit: '包' },
                { name: '香檳鳳梨', unit: '包' },
                { name: '牛奶鳳梨', unit: '包' },
                { name: '蜜梨鳳梨', unit: '包' },
                { name: '甜蜜蜜鳳梨', unit: '箱' },
                { name: '芒果鳳梨', unit: '袋' },
                { name: '琉璃鳳梨', unit: '袋' },
                { name: '玉蘭花鳳梨', unit: '袋' },
                { name: '土鳳梨', unit: '袋' },
                { name: '蜜梨果乾', unit: '袋' },
                { name: '甜蜜蜜果乾', unit: '袋' },
                { name: '琉璃果乾', unit: '袋' },
		{ name: '金鑽圓片果乾', unit: '袋' },
                { name: '金鑽角塊果乾', unit: '袋' },	
		{ name: '香檳圓片果乾', unit: '袋' },
		{ name: '香檳角塊果乾', unit: '袋' },
		{ name: '牛奶圓片果乾', unit: '袋' },
		{ name: '牛奶角塊果乾', unit: '袋' },
		{ name: '玉蘭花圓片果乾', unit: '袋' },
		{ name: '玉蘭花角塊果乾', unit: '袋' },
		{ name: '芒果鳳梨果乾', unit: '袋' },
		{ name: '金鑽凍乾', unit: '袋' },
                { name: '香檳凍乾', unit: '袋' },
                { name: '牛奶凍乾', unit: '袋' },
                { name: '蜜梨凍乾', unit: '袋' },
                { name: '甜蜜蜜凍乾', unit: '袋' },
                { name: '芒果凍乾', unit: '袋' },
                { name: '琉璃凍乾', unit: '袋' },
                { name: '玉蘭花凍乾', unit: '盒' },
		{ name: '鳳梨碎肉', unit: '盒' },
		{ name: '鳳梨餡', unit: '盒' },
		{ name: '雞蛋', unit: '盒' },
		{ name: '大豆', unit: '盒' }
            ],
            warehouses: ['A庫', 'B庫', 'C庫'],
            units: ['包', '箱', '袋', '盒', '罐', '個'],
            records: [],
            googleForms: { outbound: '', inbound: '' }
        };

        // 按鈕禁用計時器變數
        let outboundTimer = null;
        let inboundTimer = null;

        // ========== 初始化 ==========
        document.addEventListener('DOMContentLoaded', function() {
            loadData();
            initDateTime();
            initSelects();
            renderLists();
            updateNotes('outbound');
            updateNotes('inbound');
            setupEventListeners();
            setupWeightConversion();  // 雙向換算
            autoClearRecords();       // 每天凌晨自動清空（保留作為備用，但主要靠提交後清空）
        });

        // ---------- 雙向重量換算 ----------
        function setupWeightConversion() {
            // 出庫
            const outboundTael = document.getElementById('outbound-weight-tael');
            const outboundKg = document.getElementById('outbound-weight-kg');
            
            function updateFromTael() {
                const tael = parseFloat(outboundTael.value);
                if (!isNaN(tael) && tael > 0) {
                    outboundKg.value = (tael * TAEL_TO_KG).toFixed(2);
                } else {
                    outboundKg.value = '';
                }
            }
            function updateFromKg() {
                const kg = parseFloat(outboundKg.value);
                if (!isNaN(kg) && kg > 0) {
                    outboundTael.value = (kg * KG_TO_TAEL).toFixed(2);
                } else {
                    outboundTael.value = '';
                }
            }
            outboundTael.addEventListener('input', updateFromTael);
            outboundKg.addEventListener('input', updateFromKg);
            
            // 入庫
            const inboundTael = document.getElementById('inbound-weight-tael');
            const inboundKg = document.getElementById('inbound-weight-kg');
            
            function updateFromTaelIn() {
                const tael = parseFloat(inboundTael.value);
                if (!isNaN(tael) && tael > 0) {
                    inboundKg.value = (tael * TAEL_TO_KG).toFixed(2);
                } else {
                    inboundKg.value = '';
                }
            }
            function updateFromKgIn() {
                const kg = parseFloat(inboundKg.value);
                if (!isNaN(kg) && kg > 0) {
                    inboundTael.value = (kg * KG_TO_TAEL).toFixed(2);
                } else {
                    inboundTael.value = '';
                }
            }
            inboundTael.addEventListener('input', updateFromTaelIn);
            inboundKg.addEventListener('input', updateFromKgIn);
        }

        // ---------- 每天凌晨自動清空記錄（保留，但主要清空在提交後）----------
        function autoClearRecords() {
            const today = new Date().toISOString().slice(0,10);
            const lastClear = localStorage.getItem('lastClearDate');
            if (lastClear !== today) {
                // 注意：這裡不清空，因為主要清空在提交時，避免用戶誤會
                // 但仍保留作為備用
                inventoryData.records = [];
                saveData();
                localStorage.setItem('lastClearDate', today);
                console.log(`✅ 已自動清空本地記錄 (${today})`);
                updateNotes('outbound');
                updateNotes('inbound');
            }
        }

        // ---------- 資料儲存/載入 ----------
        function loadData() {
            const stored = localStorage.getItem('inventorySystem');
            if (stored) {
                try {
                    const parsed = JSON.parse(stored);
                    inventoryData = { ...inventoryData, ...parsed };
                } catch (e) {}
            }
        }
        function saveData() {
            localStorage.setItem('inventorySystem', JSON.stringify(inventoryData));
        }

        // ---------- 清空所有本地記錄（提交後呼叫）----------
        function clearLocalRecords() {
            inventoryData.records = [];
            saveData();
            updateNotes('outbound');
            updateNotes('inbound');
            console.log('✅ 本地暫存記錄已清空');
        }

        // ---------- 設定日期時間為現在 ----------
        function initDateTime() {
            const now = new Date();
            const dateStr = now.toISOString().slice(0,10);
            const timeStr = now.toTimeString().slice(0,5);
            document.getElementById('outbound-date').value = dateStr;
            document.getElementById('outbound-time').value = timeStr;
            document.getElementById('inbound-date').value = dateStr;
            document.getElementById('inbound-time').value = timeStr;
        }

        // ---------- 初始化所有下拉選單 ----------
        function initSelects() {
            // 人員
            ['outbound-person', 'inbound-person'].forEach(id => {
                const sel = document.getElementById(id);
                sel.innerHTML = '<option value="">請選擇</option>';
                inventoryData.persons.forEach(p => sel.innerHTML += `<option value="${p}">${p}</option>`);
            });
            // 物品
            ['outbound-item', 'inbound-item'].forEach(id => {
                const sel = document.getElementById(id);
                sel.innerHTML = '<option value="">請選擇</option>';
                inventoryData.items.forEach(it => sel.innerHTML += `<option value="${it.name}">${it.name}</option>`);
            });
            // 單位
            ['outbound-unit', 'inbound-unit'].forEach(id => {
                const sel = document.getElementById(id);
                sel.innerHTML = '<option value="">請選擇單位</option>';
                inventoryData.units.forEach(u => sel.innerHTML += `<option value="${u}">${u}</option>`);
            });
            // 倉庫
            ['outbound-warehouse', 'inbound-warehouse'].forEach(id => {
                const sel = document.getElementById(id);
                sel.innerHTML = '<option value="">請選擇</option>';
                inventoryData.warehouses.forEach(w => sel.innerHTML += `<option value="${w}">${w}</option>`);
            });
        }

        // ---------- 事件監聽綁定 ----------
        function setupEventListeners() {
            // 出庫提交
            const outboundForm = document.getElementById('outboundForm');
            const outboundBtn = document.getElementById('outbound-submit-btn');
            outboundForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                if (outboundBtn.disabled) return;
                outboundBtn.disabled = true;

                try {
                    const person = document.getElementById('outbound-person').value;
                    const itemName = document.getElementById('outbound-item').value;
                    const unit = document.getElementById('outbound-unit').value;
                    const quantity = parseInt(document.getElementById('outbound-quantity').value) || 1;
                    const tael = parseFloat(document.getElementById('outbound-weight-tael').value);
                    const kg = parseFloat(document.getElementById('outbound-weight-kg').value);
                    
                    if (!person) throw new Error('請選擇操作人員');
                    if (!itemName) throw new Error('請選擇物品');
                    if (!unit) throw new Error('請選擇單位');
                    if (isNaN(tael) && isNaN(kg)) throw new Error('請輸入重量（台斤或公斤）');
                    
                    // 最終以台斤為準，若只有公斤則換算
                    let finalTael = tael;
                    if (isNaN(finalTael) && !isNaN(kg)) {
                        finalTael = kg * KG_TO_TAEL;
                    }
                    const finalKg = finalTael * TAEL_TO_KG;
                    
                    const record = {
                        id: Date.now(), timestamp: Date.now(),
                        date: document.getElementById('outbound-date').value,
                        time: document.getElementById('outbound-time').value,
                        type: '出庫',
                        operator: person,
                        item: itemName,
                        unit: unit,
                        quantity: quantity,
                        weightTael: finalTael,
                        weightKg: finalKg,
                        warehouse: document.getElementById('outbound-warehouse').value,
                        notes: document.getElementById('outbound-notes').value
                    };
                    
                    // 先儲存到本地（為了同步前保留，但同步後立即清空）
                    inventoryData.records.push(record);
                    saveData();
                    
                    const syncRes = await syncToSheet(record);
                    if (syncRes.success) {
                        showStatus('outbound-status', `✅ ${syncRes.message} (同步成功)`, 'success');
                        // 同步成功後，清空所有本地記錄
                        clearLocalRecords();
                    } else {
                        showStatus('outbound-status', `⚠️ 記錄已儲存本地，但同步失敗：${syncRes.message}`, 'warning');
                        // 同步失敗時不清空，保留本地記錄以便後續重試
                    }
                    outboundForm.reset();
                    initDateTime();
                    // 重置重量欄位顯示
                    document.getElementById('outbound-weight-tael').value = '';
                    document.getElementById('outbound-weight-kg').value = '';
                    updateNotes('outbound');
                } catch (error) {
                    showStatus('outbound-status', `❌ 提交失敗：${error.message}`, 'error');
                } finally {
                    outboundTimer = setTimeout(() => {
                        outboundBtn.disabled = false;
                    }, 10000);
                }
            });

            // 入庫提交
            const inboundForm = document.getElementById('inboundForm');
            const inboundBtn = document.getElementById('inbound-submit-btn');
            inboundForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                if (inboundBtn.disabled) return;
                inboundBtn.disabled = true;

                try {
                    const person = document.getElementById('inbound-person').value;
                    const itemName = document.getElementById('inbound-item').value;
                    const unit = document.getElementById('inbound-unit').value;
                    const quantity = parseInt(document.getElementById('inbound-quantity').value) || 1;
                    const tael = parseFloat(document.getElementById('inbound-weight-tael').value);
                    const kg = parseFloat(document.getElementById('inbound-weight-kg').value);
                    
                    if (!person) throw new Error('請選擇操作人員');
                    if (!itemName) throw new Error('請選擇物品');
                    if (!unit) throw new Error('請選擇單位');
                    if (isNaN(tael) && isNaN(kg)) throw new Error('請輸入重量（台斤或公斤）');
                    
                    let finalTael = tael;
                    if (isNaN(finalTael) && !isNaN(kg)) {
                        finalTael = kg * KG_TO_TAEL;
                    }
                    const finalKg = finalTael * TAEL_TO_KG;
                    
                    const record = {
                        id: Date.now(), timestamp: Date.now(),
                        date: document.getElementById('inbound-date').value,
                        time: document.getElementById('inbound-time').value,
                        type: '入庫',
                        operator: person,
                        item: itemName,
                        unit: unit,
                        quantity: quantity,
                        weightTael: finalTael,
                        weightKg: finalKg,
                        warehouse: document.getElementById('inbound-warehouse').value,
                        notes: document.getElementById('inbound-notes').value
                    };
                    
                    inventoryData.records.push(record);
                    saveData();
                    
                    const syncRes = await syncToSheet(record);
                    if (syncRes.success) {
                        showStatus('inbound-status', `✅ ${syncRes.message} (同步成功)`, 'success');
                        clearLocalRecords();
                    } else {
                        showStatus('inbound-status', `⚠️ 記錄已儲存本地，但同步失敗：${syncRes.message}`, 'warning');
                    }
                    inboundForm.reset();
                    initDateTime();
                    document.getElementById('inbound-weight-tael').value = '';
                    document.getElementById('inbound-weight-kg').value = '';
                    updateNotes('inbound');
                } catch (error) {
                    showStatus('inbound-status', `❌ 提交失敗：${error.message}`, 'error');
                } finally {
                    inboundTimer = setTimeout(() => {
                        inboundBtn.disabled = false;
                    }, 10000);
                }
            });

            // 儲存 Google 試算表連結
            document.getElementById('save-google-forms').addEventListener('click', () => {
                inventoryData.googleForms.outbound = document.getElementById('google-form-outbound').value.trim();
                inventoryData.googleForms.inbound = document.getElementById('google-form-inbound').value.trim();
                saveData();
                updateGoogleLinksUI();
                showStatus('google-forms-status', '✅ 試算表連結已儲存', 'success');
            });

            // 人員/物品/單位/倉庫 新增
            document.getElementById('add-person').addEventListener('click', () => {
                const val = document.getElementById('new-person').value.trim();
                if (!val) return alert('請輸入名稱');
                if (inventoryData.persons.includes(val)) return alert('人員已存在');
                inventoryData.persons.push(val);
                saveData(); initSelects(); renderLists(); showStatus('settings-status', '新增成功', 'success');
                document.getElementById('new-person').value = '';
            });
            document.getElementById('add-item').addEventListener('click', () => {
                const name = document.getElementById('new-item-name').value.trim();
                const unit = document.getElementById('new-item-unit-default').value.trim();
                if (!name || !unit) return alert('請填寫物品名稱和預設單位');
                if (inventoryData.items.some(i => i.name === name)) return alert('物品已存在');
                inventoryData.items.push({ name, unit });
                saveData(); initSelects(); renderLists(); showStatus('settings-status', '新增成功', 'success');
                document.getElementById('new-item-name').value = '';
                document.getElementById('new-item-unit-default').value = '';
            });
            document.getElementById('add-unit').addEventListener('click', () => {
                const val = document.getElementById('new-unit').value.trim();
                if (!val) return alert('請輸入單位名稱');
                if (inventoryData.units.includes(val)) return alert('單位已存在');
                inventoryData.units.push(val);
                saveData(); initSelects(); renderLists(); showStatus('settings-status', '新增成功', 'success');
                document.getElementById('new-unit').value = '';
            });
            document.getElementById('add-warehouse').addEventListener('click', () => {
                const val = document.getElementById('new-warehouse').value.trim();
                if (!val) return alert('請輸入倉庫名稱');
                if (inventoryData.warehouses.includes(val)) return alert('倉庫已存在');
                inventoryData.warehouses.push(val);
                saveData(); initSelects(); renderLists(); showStatus('settings-status', '新增成功', 'success');
                document.getElementById('new-warehouse').value = '';
            });

            // 匯出/匯入
            document.getElementById('export-data').addEventListener('click', openExportModal);
            document.getElementById('import-data').addEventListener('click', () => document.getElementById('import-file').click());
            document.getElementById('import-file').addEventListener('change', importJSON);
        }

        // ---------- Google Sheets 同步核心 ----------
        async function syncToSheet(record) {
            try {
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    mode: 'cors',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(record)
                });
                const result = await response.json();
                return { success: true, message: `寫入成功 (第${result.row}列)` };
            } catch (error) {
                console.error('同步錯誤:', error);
                return { success: false, message: error.message };
            }
        }

        // ---------- 更新 Google 試算表連結 UI ----------
        function updateGoogleLinksUI() {
            ['outbound', 'inbound'].forEach(type => {
                const link = inventoryData.googleForms[type];
                const statusEl = document.getElementById(`${type}-google-status`);
                const linkEl = document.getElementById(`${type}-google-link`);
                if (link && linkEl) {
                    statusEl.innerText = '✅ 已設定試算表連結，點擊下方按鈕開啟';
                    linkEl.href = link;
                    linkEl.style.display = 'inline-flex';
                } else if (statusEl) {
                    statusEl.innerText = '⚠️ 尚未設定試算表連結，請至系統設定中設定';
                    if (linkEl) linkEl.style.display = 'none';
                }
            });
            const outboundInput = document.getElementById('google-form-outbound');
            const inboundInput = document.getElementById('google-form-inbound');
            if (outboundInput) outboundInput.value = inventoryData.googleForms.outbound || '';
            if (inboundInput) inboundInput.value = inventoryData.googleForms.inbound || '';
        }

        // ---------- 今日備註加總 ----------
        function updateNotes(type) {
            const today = new Date().toISOString().slice(0,10);
            const chn = type === 'outbound' ? '出庫' : '入庫';
            const todayRecords = inventoryData.records.filter(r => r.date === today && r.type === chn);
            const hasNotes = todayRecords.filter(r => r.notes && r.notes.trim() !== '');

            const statsDiv = document.getElementById(`${type}-notes-stats`);
            if (statsDiv) {
                statsDiv.innerHTML = `
                    <div class="stat-box"><div class="stat-number">${todayRecords.length}</div><div>今日記錄</div></div>
                    <div class="stat-box"><div class="stat-number">${hasNotes.length}</div><div>有備註</div></div>
                    <div class="stat-box"><div class="stat-number">${todayRecords.length ? Math.round(hasNotes.length/todayRecords.length*100) : 0}%</div><div>備註率</div></div>
                `;
            }
            const listDiv = document.getElementById(`${type}-notes-list`);
            if (listDiv) {
                if (!hasNotes.length) {
                    listDiv.innerHTML = '<div class="empty-state"><i class="fas fa-inbox"></i><p>今日無備註記錄</p></div>';
                } else {
                    listDiv.innerHTML = hasNotes.map(r => `
                        <div class="note-item">
                            <strong>📌 ${r.notes}</strong>
                            <div style="color:#6b7280; margin-top: 6px; font-size:0.9rem;">
                                ${r.operator} · ${r.item} ${r.quantity}${r.unit} · 
                                ${r.weightTael.toFixed(2)}台斤 (${r.weightKg.toFixed(2)}公斤) · ${r.time}
                            </div>
                        </div>
                    `).join('');
                }
            }
            const summaryEl = document.getElementById(`${type}-notes-summary`);
            if (summaryEl) summaryEl.style.display = todayRecords.length ? 'block' : 'none';
        }

        // ---------- 渲染後台清單 ----------
        function renderLists() {
            // 人員
            let html = '';
            inventoryData.persons.forEach((p,i) => html += `<div class="record-item"><span><i class="fas fa-user"></i> ${p}</span><button class="btn-danger" onclick="deleteListItem('person',${i})"><i class="fas fa-trash"></i></button></div>`);
            document.getElementById('person-list').innerHTML = html || '<div class="empty-state">無人員</div>';
            // 物品
            html = '';
            inventoryData.items.forEach((it,i) => html += `<div class="record-item"><span><strong>${it.name}</strong> (預設單位: ${it.unit})</span><button class="btn-danger" onclick="deleteListItem('item',${i})"><i class="fas fa-trash"></i></button></div>`);
            document.getElementById('item-list').innerHTML = html || '<div class="empty-state">無物品</div>';
            // 單位
            html = '';
            inventoryData.units.forEach((u,i) => html += `<div class="record-item"><span><i class="fas fa-ruler"></i> ${u}</span><button class="btn-danger" onclick="deleteListItem('unit',${i})"><i class="fas fa-trash"></i></button></div>`);
            document.getElementById('unit-list').innerHTML = html || '<div class="empty-state">無單位</div>';
            // 倉庫
            html = '';
            inventoryData.warehouses.forEach((w,i) => html += `<div class="record-item"><span><i class="fas fa-warehouse"></i> ${w}</span><button class="btn-danger" onclick="deleteListItem('warehouse',${i})"><i class="fas fa-trash"></i></button></div>`);
            document.getElementById('warehouse-list').innerHTML = html || '<div class="empty-state">無倉庫</div>';
        }

        window.deleteListItem = function(type, index) {
            if (!confirm('確定刪除？')) return;
            if (type === 'person') inventoryData.persons.splice(index,1);
            if (type === 'item') inventoryData.items.splice(index,1);
            if (type === 'unit') inventoryData.units.splice(index,1);
            if (type === 'warehouse') inventoryData.warehouses.splice(index,1);
            saveData(); initSelects(); renderLists(); showStatus('settings-status','刪除成功','success');
        };

        // ---------- 匯出功能 ----------
        function openExportModal() {
            document.getElementById('export-modal').classList.add('active');
        }
        window.closeModal = function() { document.getElementById('export-modal').classList.remove('active'); };
        window.selectExport = function(val) {
            document.querySelector(`input[value="${val}"]`).checked = true;
        };
        window.doExport = function() {
            alert('匯出功能請自行擴充 XLSX 實作');
            closeModal();
        };

        // ---------- JSON 匯入 ----------
        function importJSON(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(ev) {
                try {
                    const imported = JSON.parse(ev.target.result);
                    if (confirm('匯入將覆蓋現有資料，確定？')) {
                        inventoryData = imported;
                        saveData();
                        initSelects(); renderLists(); updateNotes('outbound'); updateNotes('inbound');
                        showStatus('settings-status','匯入成功','success');
                    }
                } catch (ex) { alert('檔案格式錯誤'); }
            };
            reader.readAsText(file);
            e.target.value = '';
        }

        // ---------- 顯示狀態訊息 ----------
        function showStatus(elId, msg, type) {
            const el = document.getElementById(elId);
            if (el) {
                el.textContent = msg;
                el.className = `status-message status-${type}`;
                el.style.display = 'block';
                setTimeout(() => el.style.display = 'none', 4000);
            }
        }

        // ---------- 切換頁籤 ----------
        window.switchTab = function(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`tab-${tabId}`).classList.add('active');
            event.currentTarget.classList.add('active');
            if (tabId === 'outbound') updateNotes('outbound');
            if (tabId === 'inbound') updateNotes('inbound');
        };
    </script>
</body>
</html>
