<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0, user-scalable=yes">
    <title>庫存管理系統 · 專業版</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <style>
        /* ===== 全域樣式 ===== */
        :root {
            --primary-color: #10b981;
            --secondary-color: #3b82f6;
            --danger-color: #ef4444;
            --warning-color: #f59e0b;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif; }
        body { background-color: var(--bg-color); padding: 20px; color: #1f2937; }
        .container { max-width: 1200px; margin: 0 auto; }

        .header {
            background: linear-gradient(145deg, #10b981, #059669);
            color: white; padding: 25px; border-radius: 20px; margin-bottom: 25px;
            box-shadow: 0 10px 20px rgba(16, 185, 129, 0.2);
            display: flex; align-items: center; gap: 20px;
        }
        .header i { font-size: 40px; background: rgba(255,255,255,0.2); padding: 15px; border-radius: 15px; }

        .nav-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 25px; }
        .nav-btn {
            background: white; border: 2px solid transparent; border-radius: 15px; padding: 15px;
            font-size: 1.1rem; font-weight: 600; cursor: pointer; transition: 0.2s;
            display: flex; flex-direction: column; align-items: center; gap: 8px; color: #4b5563;
        }
        .nav-btn.active { color: white; transform: translateY(-3px); box-shadow: 0 8px 15px rgba(0,0,0,0.1); }
        .nav-btn.outbound.active { background: var(--danger-color); }
        .nav-btn.inbound.active { background: var(--secondary-color); }
        .nav-btn.settings.active { background: #6b7280; }

        .tab-content { display: none; background: var(--card-bg); border-radius: 20px; padding: 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); animation: fadeIn 0.3s; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .form-card { background: #f9fafb; border-radius: 15px; padding: 20px; margin-bottom: 20px; border: 1px solid #e5e7eb; }
        .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 15px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: #374151; font-size: 0.9rem; }
        input, select, textarea { width: 100%; padding: 12px; border: 2px solid #d1d5db; border-radius: 10px; font-size: 1rem; }
        input:focus { border-color: var(--primary-color); outline: none; box-shadow: 0 0 0 3px rgba(16,185,129,0.1); }

        button { 
            border: none; border-radius: 12px; padding: 14px 20px; font-size: 1rem; font-weight: 600;
            cursor: pointer; transition: 0.2s; color: white; width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        button:hover { filter: brightness(1.1); transform: translateY(-2px); }
        .btn-outbound { background: var(--danger-color); }
        .btn-inbound { background: var(--secondary-color); }
        .btn-success { background: var(--primary-color); }
        .btn-gray { background: #6b7280; }
        .btn-outline-danger { background: white; color: var(--danger-color); border: 2px solid var(--danger-color); }

        .status-message { padding: 15px; border-radius: 10px; margin-top: 15px; display: none; font-weight: 600; text-align: center; }
        .status-success { background: #d1fae5; color: #065f46; }
        .status-error { background: #fee2e2; color: #991b1b; }

        .info-box { background: #f9fafb; border-left: 5px solid var(--secondary-color); padding: 15px; border-radius: 10px; margin-top: 20px; }
        .record-list { max-height: 300px; overflow-y: auto; margin-top: 10px; }
        .record-item { background: white; padding: 12px; border-radius: 10px; margin-bottom: 8px; border: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }

        @media (max-width: 600px) {
            .header { flex-direction: column; text-align: center; }
            .form-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <i class="fas fa-boxes-stacked"></i>
            <div>
                <h1>庫存管理系統</h1>
                <p>雲端同步 · 自動計算 · 報表匯出</p>
            </div>
        </div>

        <div class="nav-grid">
            <button class="nav-btn outbound active" onclick="switchTab('outbound')">
                <i class="fas fa-upload"></i> 出庫記錄
            </button>
            <button class="nav-btn inbound" onclick="switchTab('inbound')">
                <i class="fas fa-download"></i> 入庫記錄
            </button>
            <button class="nav-btn settings" onclick="switchTab('settings')">
                <i class="fas fa-user-gear"></i> 系統設定
            </button>
        </div>

        <div id="tab-outbound" class="tab-content active">
            <h2><i class="fas fa-minus-circle" style="color:var(--danger-color)"></i> 填寫出庫資料</h2>
            <div class="form-card">
                <form id="outboundForm">
                    <div class="form-row">
                        <div><label>📅 日期</label><input type="date" id="outbound-date" required></div>
                        <div><label>⏰ 時間</label><input type="time" id="outbound-time" required></div>
                    </div>
                    <div class="form-row">
                        <div><label>👤 操作人</label><select id="outbound-person" required></select></div>
                        <div><label>📦 物品</label><select id="outbound-item" required></select></div>
                    </div>
                    <div class="form-row">
                        <div><label>📏 單位</label><select id="outbound-unit" required></select></div>
                        <div><label>🔢 數量</label><input type="number" id="outbound-quantity" min="1" required></div>
                    </div>
                    <div class="form-row">
                        <div><label>⚖️ 台斤</label><input type="number" id="outbound-weight-tael" step="0.01" placeholder="自動換算"></div>
                        <div><label>⚖️ 公斤</label><input type="number" id="outbound-weight-kg" step="0.01" placeholder="自動換算"></div>
                    </div>
                    <div class="form-row">
                        <div><label>🏚️ 倉庫</label><select id="outbound-warehouse" required></select></div>
                    </div>
                    <label>📝 備註</label>
                    <textarea id="outbound-notes" rows="2" placeholder="備註用途或批號..."></textarea>
                    <button type="submit" id="outbound-btn" class="btn-outbound" style="margin-top:15px">
                        <i class="fas fa-cloud-arrow-up"></i> 提交出庫並同步
                    </button>
                </form>
                <div id="outbound-status" class="status-message"></div>
            </div>
        </div>

        <div id="tab-inbound" class="tab-content">
            <h2><i class="fas fa-plus-circle" style="color:var(--secondary-color)"></i> 填寫入庫資料</h2>
            <div class="form-card">
                <form id="inboundForm">
                    <div class="form-row">
                        <div><label>📅 日期</label><input type="date" id="inbound-date" required></div>
                        <div><label>⏰ 時間</label><input type="time" id="inbound-time" required></div>
                    </div>
                    <div class="form-row">
                        <div><label>👤 操作人</label><select id="inbound-person" required></select></div>
                        <div><label>📦 物品</label><select id="inbound-item" required></select></div>
                    </div>
                    <div class="form-row">
                        <div><label>📏 單位</label><select id="inbound-unit" required></select></div>
                        <div><label>🔢 數量</label><input type="number" id="inbound-quantity" min="1" required></div>
                    </div>
                    <div class="form-row">
                        <div><label>⚖️ 台斤</label><input type="number" id="inbound-weight-tael" step="0.01" placeholder="自動換算"></div>
                        <div><label>⚖️ 公斤</label><input type="number" id="inbound-weight-kg" step="0.01" placeholder="自動換算"></div>
                    </div>
                    <div class="form-row">
                        <div><label>🏚️ 倉庫</label><select id="inbound-warehouse" required></select></div>
                    </div>
                    <label>📝 備註</label>
                    <textarea id="inbound-notes" rows="2" placeholder="供應商資訊等..."></textarea>
                    <button type="submit" id="inbound-btn" class="btn-inbound" style="margin-top:15px">
                        <i class="fas fa-cloud-arrow-up"></i> 提交入庫並同步
                    </button>
                </form>
                <div id="inbound-status" class="status-message"></div>
            </div>
        </div>

        <div id="tab-settings" class="tab-content">
            <h2><i class="fas fa-cog"></i> 系統設定與管理</h2>
            
            <div class="info-box" style="border-left-color: var(--danger-color);">
                <h3><i class="fas fa-sync-alt"></i> 更新同步問題</h3>
                <p style="font-size: 0.9rem; margin: 10px 0;">如果您新增了人員或物品卻沒看到，請點擊下方按鈕強制清除舊緩存。</p>
                <button class="btn-outline-danger" onclick="hardResetSystem()">
                    <i class="fas fa-trash-can"></i> 強制重整系統資料 (解決更新沒出現的問題)
                </button>
            </div>

            <div class="info-box">
                <h3><i class="fas fa-file-excel"></i> 資料導出</h3>
                <p style="font-size: 0.9rem; margin: 10px 0;">將存放在此裝置上的暫存紀錄導出為 Excel 檔案。</p>
                <button class="btn-success" onclick="exportToExcel()">
                    <i class="fas fa-download"></i> 導出本地紀錄 (.xlsx)
                </button>
            </div>

            <div class="info-box">
                <h3><i class="fas fa-users"></i> 人員管理</h3>
                <div class="form-row">
                    <input type="text" id="new-person" placeholder="輸入姓名">
                    <button class="btn-success" style="width:80px" onclick="addNew('persons', 'new-person')">新增</button>
                </div>
                <div id="list-persons" class="record-list"></div>
            </div>
        </div>
    </div>

    <script>
        // ======= 核心設定：請更換為您的 GAS 部署網址 =======
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbwPIy6-na3dnCRjzps8tEFVZBCzpRanrQ_k7IzVJhEOkIowMHRRFhRM7f7xB0RysnnX/exec';
        const TAEL_TO_KG = 0.6;

        // ======= 預設資料 (已修正逗號問題) =======
        let inventoryData = {
            persons: ['蕭詠方', '王珮儒', '王俊智', '朱宥銓', '何致瑩', '蔡惠如', '魏賢豪', '魏銓輝', '洪承億', '張源展', '陳紐庭', '陳冠瑋', '何淑年', '曾瑛婷', '林佳慧', '林美慧', '陳映延', '張家均'],
            items: [
                { name: '鳳梨蘋果汁', unit: '包' }, { name: '鳳梨汁', unit: '包' }, { name: '金鑽鳳梨', unit: '包' },
                { name: '香檳鳳梨', unit: '包' }, { name: '牛奶鳳梨', unit: '包' }, { name: '蜜梨鳳梨', unit: '包' },
                { name: '甜蜜蜜鳳梨', unit: '箱' }, { name: '芒果鳳梨', unit: '袋' }, { name: '琉璃鳳梨', unit: '袋' },
                { name: '玉蘭花鳳梨', unit: '袋' }, { name: '土鳳梨', unit: '袋' }, { name: '蜜梨果乾', unit: '袋' },
                { name: '甜蜜蜜果乾', unit: '袋' }, { name: '琉璃果乾', unit: '袋' }, { name: '金鑽圓片果乾', unit: '袋' },
                { name: '金鑽角塊果乾', unit: '袋' }, { name: '香檳圓片果乾', unit: '袋' }, { name: '香檳角塊果乾', unit: '袋' },
                { name: '牛奶圓片果乾', unit: '袋' }, { name: '牛奶角塊果乾', unit: '袋' }, { name: '玉蘭花圓片果乾', unit: '袋' },
                { name: '玉蘭花角塊果乾', unit: '袋' }, { name: '芒果鳳梨果乾', unit: '袋' }, { name: '金鑽凍乾', unit: '袋' },
                { name: '香檳凍乾', unit: '袋' }, { name: '牛奶凍乾', unit: '袋' }, { name: '蜜梨凍乾', unit: '袋' },
                { name: '甜蜜蜜凍乾', unit: '袋' }, { name: '芒果凍乾', unit: '袋' }, { name: '琉璃凍乾', unit: '袋' },
                { name: '玉蘭花凍乾', unit: '盒' }, { name: '鳳梨碎肉', unit: '盒' }, { name: '鳳梨餡', unit: '盒' },
                { name: '雞蛋', unit: '盒' }, { name: '大豆', unit: '盒' }
            ],
            units: ['小白桶', '籃', '鐵桶', '包', '箱', '個'],
            warehouses: ['A庫', 'B庫', 'C庫'],
            records: []
        };

        // ======= 初始化系統 =======
        document.addEventListener('DOMContentLoaded', () => {
            loadFromLocal();
            initSelects();
            resetDateTime();
            setupWeightLogic();
            setupAutoUnit();
            renderSettingsLists();
        });

        // 載入暫存
        function loadFromLocal() {
            const saved = localStorage.getItem('inventorySystem_v2');
            if (saved) {
                const parsed = JSON.parse(saved);
                // 合併紀錄，但保留程式碼中最新的人員與物品清單（除非使用者手動新增過）
                inventoryData.records = parsed.records || [];
                if(parsed.persons && parsed.persons.length > inventoryData.persons.length) inventoryData.persons = parsed.persons;
            }
        }

        // 儲存暫存
        function saveToLocal() {
            localStorage.setItem('inventorySystem_v2', JSON.stringify(inventoryData));
        }

        // 強制重整 (核心功能)
        window.hardResetSystem = function() {
            if (confirm("⚠️ 注意：這將清除此裝置上的自定義設定並載入最新程式碼版本（包含新的人員與物品）。\n\n確定要重整嗎？")) {
                localStorage.removeItem('inventorySystem_v2');
                alert("系統已重整，即將重新載入！");
                location.reload();
            }
        };

        // 填充下拉選單
        function initSelects() {
            const fill = (id, list, isObj = false) => {
                const el = document.getElementById(id);
                el.innerHTML = '<option value="">- 請選擇 -</option>';
                list.forEach(item => {
                    const val = isObj ? item.name : item;
                    el.innerHTML += `<option value="${val}">${val}</option>`;
                });
            };

            ['outbound-person', 'inbound-person'].forEach(id => fill(id, inventoryData.persons));
            ['outbound-item', 'inbound-item'].forEach(id => fill(id, inventoryData.items, true));
            ['outbound-unit', 'inbound-unit'].forEach(id => fill(id, inventoryData.units));
            ['outbound-warehouse', 'inbound-warehouse'].forEach(id => fill(id, inventoryData.warehouses));
        }

        // 自動帶入單位
        function setupAutoUnit() {
            ['outbound', 'inbound'].forEach(type => {
                document.getElementById(`${type}-item`).addEventListener('change', (e) => {
                    const found = inventoryData.items.find(i => i.name === e.target.value);
                    if (found) document.getElementById(`${type}-unit`).value = found.unit;
                });
            });
        }

        // 重量換算
        function setupWeightLogic() {
            ['outbound', 'inbound'].forEach(type => {
                const tael = document.getElementById(`${type}-weight-tael`);
                const kg = document.getElementById(`${type}-weight-kg`);
                tael.oninput = () => kg.value = tael.value ? (tael.value * TAEL_TO_KG).toFixed(2) : '';
                kg.oninput = () => tael.value = kg.value ? (kg.value / TAEL_TO_KG).toFixed(2) : '';
            });
        }

        // 提交表單
        ['outbound', 'inbound'].forEach(type => {
            document.getElementById(`${type}Form`).onsubmit = async (e) => {
                e.preventDefault();
                const btn = document.getElementById(`${type}-btn`);
                btn.disabled = true;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 同步中...';

                const record = {
                    date: document.getElementById(`${type}-date`).value,
                    time: document.getElementById(`${type}-time`).value,
                    type: type === 'outbound' ? '出庫' : '入庫',
                    operator: document.getElementById(`${type}-person`).value,
                    item: document.getElementById(`${type}-item`).value,
                    unit: document.getElementById(`${type}-unit`).value,
                    quantity: document.getElementById(`${type}-quantity`).value,
                    weightTael: document.getElementById(`${type}-weight-tael`).value || 0,
                    weightKg: document.getElementById(`${type}-weight-kg`).value || 0,
                    warehouse: document.getElementById(`${type}-warehouse`).value,
                    notes: document.getElementById(`${type}-notes`).value
                };

                try {
                    const response = await fetch(GAS_URL, {
                        method: 'POST',
                        mode: 'cors',
                        headers: { 'Content-Type': 'text/plain' },
                        body: JSON.stringify(record)
                    });
                    const result = await response.json();
                    
                    if (result.success) {
                        inventoryData.records.push(record);
                        saveToLocal();
                        showStatus(`${type}-status`, '✅ 同步成功！資料已寫入雲端。', 'success');
                        e.target.reset();
                        resetDateTime();
                    } else { throw new Error(); }
                } catch (err) {
                    showStatus(`${type}-status`, '❌ 同步失敗，請檢查網路或 GAS 網址。', 'error');
                } finally {
                    btn.disabled = false;
                    btn.innerHTML = `<i class="fas fa-cloud-arrow-up"></i> 提交${type === 'outbound' ? '出庫' : '入庫'}並同步`;
                }
            };
        });

        // 導出 Excel
        window.exportToExcel = function() {
            if (inventoryData.records.length === 0) return alert("目前沒有本地紀錄可導出");
            const ws = XLSX.utils.json_to_sheet(inventoryData.records);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "庫存紀錄");
            XLSX.writeFile(wb, `庫存報表_${new Date().toLocaleDateString()}.xlsx`);
        };

        // UI 輔助功能
        function resetDateTime() {
            const now = new Date();
            document.querySelectorAll('input[type="date"]').forEach(el => el.value = now.toISOString().split('T')[0]);
            document.querySelectorAll('input[type="time"]').forEach(el => el.value = now.toTimeString().slice(0,5));
        }

        function showStatus(id, msg, cls) {
            const el = document.getElementById(id);
            el.textContent = msg; el.className = `status-message status-${cls}`;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 4000);
        }

        window.switchTab = (id) => {
            document.querySelectorAll('.tab-content, .nav-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(`tab-${id}`).classList.add('active');
            event.currentTarget.classList.add('active');
        };

        function renderSettingsLists() {
            const list = document.getElementById('list-persons');
            list.innerHTML = inventoryData.persons.map((p, i) => `
                <div class="record-item"><span>${p}</span><i class="fas fa-times" style="color:red;cursor:pointer" onclick="removeData('persons', ${i})"></i></div>
            `).join('');
        }

        window.addNew = (key, inputId) => {
            const val = document.getElementById(inputId).value.trim();
            if (val) {
                inventoryData[key].push(val);
                saveToLocal(); initSelects(); renderSettingsLists();
                document.getElementById(inputId).value = '';
            }
        };

        window.removeData = (key, i) => {
            if (confirm("確定刪除？")) {
                inventoryData[key].splice(i, 1);
                saveToLocal(); initSelects(); renderSettingsLists();
            }
        };
    </script>
</body>
</html>
